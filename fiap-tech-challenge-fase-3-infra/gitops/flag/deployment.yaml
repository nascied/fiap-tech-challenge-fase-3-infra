apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag
  namespace: default
  labels:
    app: flag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag
  template:
    metadata:
      labels:
        app: flag
    spec:
      containers:
        - name: flag
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/flag:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
