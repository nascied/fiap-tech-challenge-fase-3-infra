name: Terraform IaC

on:
  pull_request:
    branches:
      - main
    paths:
      - "iac/terraform/**"
  push:
    branches:
      - dev
    paths:
      - "iac/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac/terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configura TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Cria terraform.tfvars
        run: printf "%s" "$TERRAFORM_TFVARS" > terraform.tfvars

      - name: Lint Terraform
        run: |
          terraform fmt -check -recursive
          terraform init -upgrade
          terraform validate
          tflint --init
          tflint --recursive

      - name: Realizando teste unitários
        run: terraform test

      - name: Instala Checkov
        run: pipx install checkov

      - name: Gera relatório Checkov (JSON)
        run: |
          ~/.local/bin/checkov -d . \
            --framework terraform \
            -o json > checkov-report.json || true

      - name: Publica relatório Checkov em tabela
        if: always()
        run: |
          echo "## Relatório Checkov (Terraform)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Check ID | Severidade | Recurso | Arquivo |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          if [ -s checkov-report.json ]; then
            jq -r '
              (.results.failed_checks[]? | [
                "FAILED",
                (.check_id // "-"),
                (.severity // "-"),
                (.resource // "-"),
                (.file_path // "-")
              ]),
              (.results.passed_checks[]? | [
                "PASSED",
                (.check_id // "-"),
                (.severity // "-"),
                (.resource // "-"),
                (.file_path // "-")
              ])
              | @tsv
            ' checkov-report.json 2>/dev/null | \
            while IFS=$'\t' read -r status check_id severity resource file_path; do
              echo "| ${status} | ${check_id} | ${severity} | ${resource} | ${file_path} |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "| INFO | - | - | - | Checkov não gerou relatório JSON |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform plan
        if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=terraform.tfvars -auto-approve
