name: Terraform IaC

on:
  pull_request:
    branches:
      - main
    paths:
      - "iac/terraform/**"
  push:
    branches:
      - dev
    paths:
      - "iac/terraform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac/terraform

    env:
      # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      # AWS_REGION: ${{ secrets.AWS_REGION }}
      # AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_IN_AUTOMATION: true
      TF_INPUT: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug credenciais (temporário)
        run: |
          echo "ACCESS_KEY definida: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}"
          echo "SECRET_KEY definida: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' }}"
          echo "SESSION_TOKEN definida: ${{ secrets.AWS_SESSION_TOKEN != '' }}"
          echo "Primeiros chars ACCESS_KEY: $(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | cut -c1-4)"
      
      - name: Configura credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configura TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Define arquivo tfvars por branch
        run: |
          # pull_request usa GITHUB_BASE_REF (branch de destino do PR)
          # push e workflow_dispatch usam GITHUB_REF_NAME (branch atual)
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BRANCH="${GITHUB_BASE_REF}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          echo "Branch detectada: ${BRANCH}"

          case "${BRANCH}" in
            dev)
              ENV="dev"
              ;;
            main)
              ENV="prd"
              ;;
            *)
              echo "❌ Branch não suportada para deploy: ${BRANCH}"
              exit 1
              ;;
          esac

          echo "TF_VARS_FILE=terraform.${ENV}.tfvars" >> "$GITHUB_ENV"
          echo "DEPLOY_ENV=${ENV}" >> "$GITHUB_ENV"

      - name: Mostra arquivo tfvars selecionado
        run: |
          echo "Ambiente: ${DEPLOY_ENV}"
          echo "Arquivo: ${TF_VARS_FILE}"

      - name: Lint Terraform
        run: |
          terraform fmt -check -recursive
          terraform init -upgrade -backend-config="backends/${DEPLOY_ENV}.tfbackend"
          terraform validate
          tflint --init
          tflint --recursive

      - name: Testes unitários
        run: terraform test

      - name: Instala Checkov
        run: pipx install checkov

      - name: Gera relatório Checkov (JSON)
        run: |
          ~/.local/bin/checkov -d . \
            --framework terraform \
            -o json > checkov-report.json || CHECKOV_EXIT=$?

          # Persiste o exit code para exibição no summary (não quebra a pipeline)
          echo "CHECKOV_EXIT=${CHECKOV_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Publica relatório Checkov em tabela
        if: always()
        run: |
          echo "## Relatório Checkov (Terraform) — Ambiente: ${DEPLOY_ENV}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${CHECKOV_EXIT}" != "0" ]; then
            echo "⚠️ **Checkov encontrou findings — revisar antes do apply**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ **Nenhum finding detectado pelo Checkov**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "| Status | Check ID | Severidade | Recurso | Arquivo |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          if [ -s checkov-report.json ]; then
            jq -r '
              (.results.failed_checks[]? | [
                "❌ FAILED",
                (.check_id // "-"),
                (.severity // "-"),
                (.resource // "-"),
                (.file_path // "-")
              ]),
              (.results.passed_checks[]? | [
                "✅ PASSED",
                (.check_id // "-"),
                (.severity // "-"),
                (.resource // "-"),
                (.file_path // "-")
              ])
              | @tsv
            ' checkov-report.json 2>/dev/null | \
            while IFS=$'\t' read -r status check_id severity resource file_path; do
              echo "| ${status} | ${check_id} | ${severity} | ${resource} | ${file_path} |" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "| INFO | - | - | - | Checkov não gerou relatório JSON |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform Plan
        if: >-
          github.event_name == 'pull_request' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'))
        run: terraform plan -var-file="${TF_VARS_FILE}" -out=tfplan

      - name: Terraform Apply
        # Somente via workflow_dispatch — sem apply automático no push
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        # Somente via workflow_dispatch com branch como fonte da verdade do ambiente
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="${TF_VARS_FILE}" -auto-approve
