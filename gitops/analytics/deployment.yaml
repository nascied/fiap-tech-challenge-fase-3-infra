apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: default
  labels:
    app: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/analytics:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
